        File: popup.html
        Purpose: The primary user interface for the extension.

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CRX Blueprint - Extension Extractor</title>

    <style>
        :root {
            --win-bg: #202020;
            --win-surface: rgba(255, 255, 255, 0.04);
            --win-surface-hover: rgba(255, 255, 255, 0.07);
            --win-surface-active: rgba(255, 255, 255, 0.03);
            --win-border: rgba(255, 255, 255, 0.06);
            --win-border-top: rgba(255, 255, 255, 0.1);
            --win-text: #f0f0f0;
            --win-subtext: #a0a0a0;
            --win-accent: #60cdff;
            --win-accent-hover: #53b8e7;
        }

        body {
            margin: 0;
            padding: 0;
            width: 280px;
            background: var(--win-bg);
            color: var(--win-text);
            font-family: "Segoe UI Variable", "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 12.5px;
            display: flex;
            flex-direction: column;
            user-select: none;
            overflow: hidden;
        }

        .titlebar {
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-left: 12px;
            padding-right: 4px;
            -webkit-app-region: drag;
        }

        .title-text {
            display: flex;
            align-items: center;
            font-size: 11.5px;
            color: var(--win-subtext);
            gap: 8px;
        }

        .title-text img {
            width: 14px;
            height: 14px;
            border-radius: 2px;
        }

        .window-controls {
            display: flex;
            height: 22px;
            gap: 2px;
            -webkit-app-region: no-drag;
        }

        .win-btn {
            width: 34px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.1s;
            color: var(--win-text);
        }

        .win-btn svg {
            width: 10px;
            height: 10px;
        }

        .win-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .win-btn.close:hover {
            background: #e81123;
            color: white;
        }

        .win-content {
            padding: 4px 12px 12px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 6px 12px;
            font-size: 12.5px;
            color: var(--win-text);
            background: var(--win-surface);
            border: 1px solid var(--win-border);
            border-top: 1px solid var(--win-border-top);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.1s;
            box-sizing: border-box;
            text-align: left;
        }

        .btn:hover {
            background: var(--win-surface-hover);
        }

        .btn:active {
            background: var(--win-surface-active);
            border-top: 1px solid var(--win-border);
            color: var(--win-subtext);
        }

        .btn.primary {
            background: var(--win-accent);
            color: #000;
            border: 1px solid transparent;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .btn.primary:hover {
            background: var(--win-accent-hover);
        }

        .btn.primary:active {
            background: #4caad7;
            color: rgba(0, 0, 0, 0.7);
            border: 1px solid transparent;
        }

        .btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        input[type="file"] {
            display: none;
        }

        .status-container {
            margin-top: 6px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .progress-bar-container {
            width: 100%;
            height: 3px;
            background: var(--win-surface);
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--win-accent);
            transition: width 0.2s ease;
        }

        .bottom-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-text {
            font-size: 11px;
            color: var(--win-subtext);
        }

        .github-link {
            font-size: 11px;
            color: var(--win-subtext);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color 0.1s;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.15);
        }

        .github-link:hover {
            color: var(--win-accent);
            background: rgba(0, 0, 0, 0.3);
        }

        .github-link svg {
            width: 11px;
            height: 11px;
            fill: currentColor;
        }
    </style>
</head>

<body>
    <div class="titlebar">

        </div>
        <div class="window-controls">
