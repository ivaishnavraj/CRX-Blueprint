<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CRX Blueprint</title>

    <!-- Prism.js: Syntax highlighting engine (Source: https://prismjs.com) -->
    <link href="../lib/prism.css" rel="stylesheet" />
    <script src="../lib/prism.js"></script>
    <script src="../lib/prism-json.js"></script>
    <script src="../lib/prism-markdown.js"></script>

    <!-- JSZip: Handles zip decompression in the browser (Source: https://stuk.github.io/jszip) -->
    <script src="../lib/jszip.js"></script>

    <!-- JS-Beautify: Un-minifies code for readability (Source: https://github.com/beautify-web/js-beautify) -->
    <script src="../lib/beautify.js"></script>
    <script src="../lib/beautify-css.js"></script>
    <script src="../lib/beautify-html.js"></script>

    <!-- Marked: Parses Markdown files (Source: https://marked.js.org) -->
    <script src="../lib/marked.min.js"></script>

    <style>
        /* Core Design System Hooks mapping smoothly */
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            /* Standard Dark Mode Palette bounds */
            --bg-dark: #131314;
            --surface: #1e1f20;
            --surface-hover: #2a2b2f;
            --border: #444746;
            --text: #e3e3e3;
            --subtext: #8e8e8e;
            --gemini-grad: linear-gradient(90deg, #4285F4, #9B72CB, #D96570);
            --blue: #a8c7fa;
            --active-bg: rgba(168, 199, 250, 0.12);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Google Sans', sans-serif;
            color: var(--text);
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Wraps the entire core Workspace GUI establishing bounds physically disconnecting from browser borders imitating desktop windows natively */
        #ide-wrapper {
            width: 95vw;
            max-width: 1400px;
            height: 95vh;
            max-height: 900px;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 15px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid #333;
        }

        /* Top mathematical gradient border tracking execution cleanly */
        .header-grad {
            height: 4px;
            background: #0d67af;
            width: 100%;
            flex-shrink: 0;
        }

        /* Navbar header simulating conversational Studio AI bounds cleanly */
        .topbar {
            height: 56px;
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 12px;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        .main-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }

        /* Responsive sidebar generating File Explorer correctly natively */
        #sidebar {
            width: 280px;
            background: var(--bg-dark);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            overflow-x: hidden;
            padding: 2px 0px;
            flex-shrink: 0;
        }

        /* Beautiful compact folder/file mapping pills imitating VSCode perfectly avoiding bloated padding cleanly */
        .file-item {
            padding: 0px;
            cursor: pointer;
            font-size: 11.5px;
            line-height: 16px;
            transition: background 0.1s;
            white-space: nowrap;
            overflow-x: hidden;
            text-overflow: ellipsis;
            user-select: none;
            color: #cccccc;
            background: transparent;
        }

        .file-item:hover {
            background: var(--surface-hover);
            color: #fff;
        }

        .file-item.active {
            background: var(--active-bg);
            color: #fff;
        }

        .file-item.folder {
            font-weight: normal;
            color: #fff;
        }

        /* Folders Native CSS details logic cleanly styling animations flawlessly */
        details summary {
            list-style: none;
            position: relative;
            display: block;
            outline: none;
        }

        details summary::-webkit-details-marker {
            display: none;
        }

        details summary::before {
            content: "\25B6";
            font-size: 8px;
            margin-right: 4px;
            display: inline-block;
            transition: transform 0.2s;
            color: var(--subtext);
        }

        details[open]>summary::before {
            transform: rotate(90deg);
            color: #fff;
        }

        /* Central IDE workspace wrapper mapping centered blocks mimicking gorgeous floating architectures beautifully */
        #editor-container {
            flex-grow: 1;
            padding: 30px 30px 15px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #0b0b0c;
        }

        /* Central IDE visual target titles bounded by max-width seamlessly */
        #titlebar {
            width: 100%;
            max-width: 1100px;
            margin-bottom: 12px;
            font-weight: 500;
            font-size: 18px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-left: 5px;
        }

        #titlebar svg {
            width: 22px;
            height: 22px;
            fill: var(--subtext);
        }

        /* Bounding visual core isolating code perfectly centered applying deep shadows producing mock floating effect */
        #editor {
            width: 100%;
            max-width: 1100px;
            flex: 1;
            min-height: 0;
            background: #141415;
            border-radius: 12px;
            border: 1px solid #333;
            overflow: auto;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }

        /* Specific typography matching code structures flawlessly wrapping securely */
        pre {
            margin: 0;
            font-size: 13px;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* Interactive smooth visually elegant AI loading layout */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            z-index: 99;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        #loading svg {
            width: 80px;
            height: 80px;
            animation: pulse 2s infinite ease-in-out;
            margin-bottom: 20px;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.9);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
            }

            100% {
                transform: scale(0.9);
                opacity: 0.8;
            }
        }

        #prog-bar-container {
            width: 450px;
            height: 6px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.08);
            overflow: hidden;
            margin-top: 5px;
        }

        #prog {
            width: 0%;
            height: 100%;
            background: var(--gemini-grad);
            transition: width 0.1s linear;
            border-radius: 6px;
        }

        #logs {
            color: var(--subtext);
            margin-top: 15px;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Consistent clean Google-style scrolling properties organically tracking borders */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 6px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--subtext);
        }

        ::-webkit-scrollbar-corner {
            background: transparent;
        }

        /* Rich Github-Style Markdown Document Formatting ensuring dynamic readability organically */
        .markdown-preview h1,
        .markdown-preview h2 {
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
            margin-top: 25px;
        }

        .markdown-preview a {
            color: var(--blue);
            text-decoration: none;
        }

        .markdown-preview a:hover {
            text-decoration: underline;
        }

        .markdown-preview code {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .markdown-preview pre {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 13px;
            border: 1px solid var(--border);
        }

        .markdown-preview pre code {
            background: transparent;
            padding: 0;
        }

        .markdown-preview img {
            max-width: 100%;
            border-radius: 6px;
        }

        .markdown-preview blockquote {
            border-left: 4px solid var(--blue);
            margin-left: 0;
            padding-left: 15px;
            color: var(--subtext);
        }
    </style>
</head>

<body>
    <!-- Hidden string definitions linking geometric mathematics gradients inherently mapping directly to SVG codes flawlessly -->
    <svg style="width:0;height:0;position:absolute" aria-hidden="true" focusable="false">
        <defs>
            <linearGradient id="gemini-grad-ide" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#4285F4" />
                <stop offset="50%" stop-color="#9B72CB" />
                <stop offset="100%" stop-color="#D96570" />
            </linearGradient>
        </defs>
    </svg>

    <!-- Loading interface -->
    <div id="loading">
        <img src="../icons/icon.png"
            style="width: 80px; height: 80px; animation: pulse 2s infinite ease-in-out; margin-bottom: 20px;">
        <h2 style="color:#fff; margin:0; font-weight:500; letter-spacing:0.5px;">CRX Blueprint...</h2>
        <div id="prog-bar-container">
            <div id="prog"></div>
        </div>
        <div id="logs">&gt; Initializing tracking arrays...</div>
    </div>

    <!-- Permanent layout rendering cleanly wrapping core structures inside physical desktop boundary wrapper seamlessly -->
    <div id="ide-wrapper">
        <div class="header-grad"></div>
        <div class="topbar">
            <img src="../icons/icon.png" style="width:26px; height:26px">
            <span style="font-weight: 500; font-size: 18px; color: #fff;">CRX Blueprint</span>
            <a href="https://github.com/ivaishnavraj" target="_blank"

                <svg style="width:12px;height:12px;fill:currentColor" viewBox="0 0 24 24">
                    <path
                        d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                </svg>
                @ivaishnavraj
            </a>
        </div>

        <!-- Main split-pane workspace -->
        <div class="main-container">
            <div id="sidebar"></div>
            <div id="editor-container">
                <!-- Top Title Bar -->
                <div id="titlebar">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z" />
                    </svg>
                    <span id="titlebar-txt">Select a target file to parse strings...</span>
                </div>
                <div id="editor">
                    <pre id="codebox"></pre>
                </div>
                <div
                    style="margin-top:auto; padding-top:16px; font-size:10px; width:100%; display:flex; justify-content:center; flex-shrink:0;">
                    <a href="../legal/privacy.html" target="_blank"
                        style="color:#666; text-decoration:none; letter-spacing:0.5px; transition:0.2s;"
                        onmouseover="this.style.color='#ccc';" onmouseout="this.style.color='#666';">
                        Privacy Policy & Terms of Service
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Load Main Logic -->
    <script src="viewer.js"></script>
</body>

</html>
